<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Manager - Leave Requests</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">HR Manager</div>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="employees.html" class="nav-link">Employees</a>
            <a href="leaves.html" class="nav-link active">Leave Requests</a>
            <a href="payroll.html" class="nav-link">Payroll</a>
        </div>
        <div class="nav-user">
            <span id="userName"></span>
            <button class="btn-theme-toggle">🌙 Dark</button>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h2>Leave Management</h2>
            <button onclick="showLeaveModal()" class="btn btn-primary">Request Leave</button>
        </div>
        
        <div class="filter-bar">
            <select id="statusFilter" onchange="filterLeaves()">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
            </select>
        </div>
        
        <div class="table-container">
            <table id="leavesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Employee</th>
                        <th>Type</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="leavesTableBody">
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Leave Modal -->
    <div id="leaveModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLeaveModal()">&times;</span>
            <h3 id="modalTitle">Request Leave</h3>
            <form id="leaveForm">
                <input type="hidden" id="leaveId">
                <div class="form-group">
                    <label>Employee</label>
                    <select id="employeeId" required></select>
                </div>
                <div class="form-group">
                    <label>Leave Type</label>
                    <select id="leaveType" required>
                        <option value="sick">Sick Leave</option>
                        <option value="vacation">Vacation</option>
                        <option value="personal">Personal Leave</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" required>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" required>
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <textarea id="reason" rows="3"></textarea>
                </div>
                <div class="form-group" id="statusGroup" style="display:none;">
                    <label>Status</label>
                    <select id="status">
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
