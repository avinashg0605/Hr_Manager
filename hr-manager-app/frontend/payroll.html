<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Manager - Payroll</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">HR Manager</div>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="employees.html" class="nav-link">Employees</a>
            <a href="leaves.html" class="nav-link">Leave Requests</a>
            <a href="payroll.html" class="nav-link active">Payroll</a>
        </div>
        <div class="nav-user">
            <span id="userName"></span>
            <button class="btn-theme-toggle">🌙 Dark</button>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h2>Payroll Management</h2>
            <div>
                <button onclick="showGeneratePayrollModal()" class="btn btn-secondary">Generate Payroll</button>
                <button onclick="showPayrollModal()" class="btn btn-primary">Add Payroll Record</button>
            </div>
        </div>
        
        <div class="table-container">
            <table id="payrollTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Employee</th>
                        <th>Month/Year</th>
                        <th>Basic Salary</th>
                        <th>Allowances</th>
                        <th>Deductions</th>
                        <th>Net Salary</th>
                        <th>Payment Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="payrollTableBody">
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Payroll Modal -->
    <div id="payrollModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePayrollModal()">&times;</span>
            <h3 id="modalTitle">Add Payroll Record</h3>
            <form id="payrollForm">
                <input type="hidden" id="payrollId">
                <div class="form-group">
                    <label>Employee</label>
                    <select id="employeeId" required></select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <input type="number" id="month" min="1" max="12" required>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" id="year" required>
                </div>
                <div class="form-group">
                    <label>Basic Salary ($)</label>
                    <input type="number" id="basicSalary" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Allowances ($)</label>
                    <input type="number" id="allowances" step="0.01" value="0">
                </div>
                <div class="form-group">
                    <label>Deductions ($)</label>
                    <input type="number" id="deductions" step="0.01" value="0">
                </div>
                <div class="form-group">
                    <label>Net Salary ($)</label>
                    <input type="number" id="netSalary" step="0.01" readonly>
                </div>
                <div class="form-group">
                    <label>Payment Date</label>
                    <input type="date" id="paymentDate">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="pending">Pending</option>
                        <option value="paid">Paid</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <!-- Generate Payroll Modal -->
    <div id="generatePayrollModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGeneratePayrollModal()">&times;</span>
            <h3>Generate Monthly Payroll</h3>
            <form id="generatePayrollForm">
                <div class="form-group">
                    <label>Month</label>
                    <input type="number" id="genMonth" min="1" max="12" required>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" id="genYear" required>
                </div>
                <button type="submit" class="btn btn-primary">Generate</button>
            </form>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
