<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Manager - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">HR Manager</div>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="employees.html" class="nav-link">Employees</a>
            <a href="leaves.html" class="nav-link">Leave Requests</a>
            <a href="payroll.html" class="nav-link">Payroll</a>
        </div>
        <div class="nav-user">
            <span id="userName"></span>
            <button class="btn-theme-toggle">🌙 Dark</button>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Employees</h3>
                    <p id="totalEmployees">0</p>
                </div>
                <div class="stat-card">
                    <h3>Active Employees</h3>
                    <p id="activeEmployees">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending Leaves</h3>
                    <p id="pendingLeaves">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending Payroll</h3>
                    <p id="pendingPayroll">0</p>
                </div>
            </div>
            
            <div class="recent-section">
                <div class="recent-card">
                    <h3>Recent Leave Requests</h3>
                    <div id="recentLeaves"></div>
                </div>
                <div class="recent-card">
                    <h3>Recent Payroll Records</h3>
                    <div id="recentPayroll"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
