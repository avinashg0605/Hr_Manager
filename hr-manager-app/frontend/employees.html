<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Manager - Employees</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">HR Manager</div>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="employees.html" class="nav-link active">Employees</a>
            <a href="leaves.html" class="nav-link">Leave Requests</a>
            <a href="payroll.html" class="nav-link">Payroll</a>
        </div>
        <div class="nav-user">
            <span id="userName"></span>
            <button class="btn-theme-toggle">🌙 Dark</button>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h2>Employee Management</h2>
            <button onclick="showEmployeeModal()" class="btn btn-primary">Add Employee</button>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search employees by name, email or position..." onkeyup="searchEmployees()">
        </div>
        
        <div class="table-container">
            <table id="employeesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Position</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeesTableBody">
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Employee Modal -->
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEmployeeModal()">&times;</span>
            <h3 id="modalTitle">Add Employee</h3>
            <form id="employeeForm">
                <input type="hidden" id="employeeId">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" id="position" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="department" required>
                </div>
                <div class="form-group">
                    <label>Hire Date</label>
                    <input type="date" id="hireDate" required>
                </div>
                <div class="form-group">
                    <label>Salary ($)</label>
                    <input type="number" id="salary" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
